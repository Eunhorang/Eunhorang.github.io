<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="robots" content="noindex" />
    <title>페이지를 찾을 수 없습니다 | 이은호 축구 포트폴리오</title>
    <style>
      :root {
        color-scheme: light;
        font-family: Pretendard, "Apple SD Gothic Neo", "Noto Sans KR", sans-serif;
        background: #f6f7f2;
        color: #102218;
      }

      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
        padding: 24px;
        box-sizing: border-box;
      }

      main {
        width: min(560px, 100%);
        padding: 44px;
        border-radius: 28px;
        background: #ffffff;
        box-shadow: 0 24px 70px rgba(16, 34, 24, 0.12);
      }

      strong {
        color: #245bd6;
        font: 900 72px/1 Arial, sans-serif;
      }

      h1 {
        margin: 22px 0 12px;
        font-size: clamp(30px, 8vw, 48px);
        letter-spacing: -0.05em;
      }

      p {
        margin: 0 0 28px;
        color: #445149;
        line-height: 1.7;
      }

      a {
        display: inline-flex;
        padding: 14px 20px;
        border-radius: 999px;
        background: #102218;
        color: #ffffff;
        font-weight: 800;
        text-decoration: none;
      }

      a:focus-visible {
        outline: 3px solid #ff6b35;
        outline-offset: 4px;
      }
    </style>
  </head>
  <body>
    <main>
      <strong>404</strong>
      <h1>페이지를 찾을 수 없습니다.</h1>
      <p>주소가 바뀌었거나 존재하지 않는 페이지입니다. 포트폴리오 첫 화면으로 돌아가 주세요.</p>
      <a href="/lee-eunho-football-portfolio/">포트폴리오로 돌아가기</a>
    </main>
  </body>
</html>
